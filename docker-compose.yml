services:
  db:
    image: postgres:15-alpine
    container_name: fixflow-db
    environment:
      POSTGRES_DB: fixflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nada123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: fixflow-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fixflow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: nada123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fixflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    name: fixflow-network
