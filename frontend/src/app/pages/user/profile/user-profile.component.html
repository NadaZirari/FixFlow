<div class="p-8 max-w-4xl mx-auto">
      <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Mon Profil</h1>
        <p class="text-gray-500 mt-1">Gérez vos informations personnelles et votre sécurité.</p>
      </div>

      <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8">
          <div *ngIf="success" class="mb-6 p-4 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 flex items-center gap-3 animate-in fade-in slide-in-from-top-4 duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span class="font-bold">{{ success }}</span>
          </div>

          <div *ngIf="error" class="mb-6 p-4 rounded-xl bg-rose-50 border border-rose-200 text-rose-700 flex items-center gap-3 animate-in fade-in slide-in-from-top-4 duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
            </svg>
            <span class="font-bold">{{ error }}</span>
          </div>

          <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-8">
            <!-- Section Informations -->
            <div>
              <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                  </svg>
                </span>
                Informations Personnelles
              </h2>
              
             
                
                <div class="space-y-2">
                  <label class="text-sm font-black text-gray-700 uppercase tracking-wider">Nom</label>
                  <input type="text" formControlName="nom" placeholder="Votre nom"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-100 bg-gray-50/50">
                </div>

                <div class="space-y-2 md:col-span-2">
                  <label class="text-sm font-black text-gray-700 uppercase tracking-wider">Adresse Email</label>
                  <input type="email" formControlName="email" placeholder="email@exemple.com"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-100 bg-gray-50/50">
                </div>
              
            </div>

            <!-- Section Sécurité -->
            <div>
              <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span class="w-8 h-8 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                  </svg>
                </span>
                Sécurité
              </h2>
              
              <div class="space-y-2 max-w-md">
                <label class="text-sm font-black text-gray-700 uppercase tracking-wider">Nouveau Mot de passe</label>
                <input type="password" formControlName="motDePasse" placeholder="changer votre mod de passe"
                  class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 outline-none transition-all focus:border-blue-500 focus:ring-4 focus:ring-blue-100 bg-gray-50/50">
                <p class="text-xs text-gray-400">Pour votre sécurité, utilisez au moins 4 caractères.</p>
              </div>
            </div>

            <div class="pt-6 border-t-2 border-gray-50 flex items-center justify-between">
               <div class="flex items-center gap-2 text-sm text-gray-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                  </svg>
                  Vos données sont chiffrées
               </div>
               <button type="submit" [disabled]="loading || profileForm.invalid"
                class="px-8 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 hover:scale-105 transition-all disabled:opacity-50 disabled:scale-100 shadow-lg shadow-blue-200">
                <span *ngIf="!loading">Enregistrer les modifications</span>
                <span *ngIf="loading" class="flex items-center gap-2">
                  <span class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
                  Enregistrement...
                </span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
