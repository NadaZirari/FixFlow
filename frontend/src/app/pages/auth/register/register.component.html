<div class="min-h-screen flex items-center justify-center px-4 bg-gray-100">
  <div class="max-w-md w-full">
    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">FixFlow</h1>
        <p class="text-gray-500 text-sm">Creez votre compte</p>
      </div>

      <div *ngIf="error" class="mb-6 p-4 rounded-lg bg-red-50 border border-red-200 text-red-600 text-sm">
        {{ error }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Nom complet</label>
          <input type="text" formControlName="nom" placeholder="Votre nom" 
            class="border border-gray-300 rounded-lg px-4 py-3 text-gray-800 placeholder:text-gray-400 outline-none transition-all focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
          <span class="text-xs text-red-500" *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
            Minimum 2 caracteres
          </span>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Email</label>
          <input type="email" formControlName="email" placeholder="vous@exemple.com" 
            class="border border-gray-300 rounded-lg px-4 py-3 text-gray-800 placeholder:text-gray-400 outline-none transition-all focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
          <span class="text-xs text-red-500" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
            Email invalide
          </span>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700">Mot de passe</label>
          <input type="password" formControlName="motDePasse" placeholder="Minimum 6 caracteres" 
            class="border border-gray-300 rounded-lg px-4 py-3 text-gray-800 placeholder:text-gray-400 outline-none transition-all focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
          <span class="text-xs text-red-500" *ngIf="form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched">
            Minimum 6 caracteres
          </span>
        </div>

        <button type="submit" 
          class="bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-2" 
          [disabled]="loading || form.invalid">
          <span *ngIf="!loading">Creer mon compte</span>
          <span *ngIf="loading">Creation...</span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Deja un compte ? <a routerLink="/login" class="text-blue-600 font-medium hover:underline">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>
